version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: cisco_tracker_db
    environment:
      POSTGRES_DB: cisco_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cisco_network
    restart: unless-stopped

networks:
  cisco_network:
    driver: bridge

volumes:
  postgres_data: