<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cisco Trainer Portal - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/students.css">
    <link rel="stylesheet" href="css/attendance.css">
    <link rel="stylesheet" href="css/performance.css">
    <link rel="stylesheet" href="css/lab.css">
    <link rel="stylesheet" href="css/classes.css">
    <link rel="stylesheet" href="css/reports.css">
    <link rel="stylesheet" href="css/ai-assistant.css">
    <link rel="stylesheet" href="css/kpi.css">
    <link rel="stylesheet" href="css/settings.css">
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-network-wired"></i>
                    <h2>Cisco Trainer</h2>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <a class="nav-item active" data-page="dashboard">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item" data-page="students">
                    <i class="fas fa-user-graduate"></i>
                    <span>Students</span>
                </a>
                <a class="nav-item" data-page="attendance">
                    <i class="fas fa-calendar-check"></i>
                    <span>Attendance</span>
                </a>
                <a class="nav-item" data-page="performance">
                    <i class="fas fa-chart-bar"></i>
                    <span>Performance</span>
                </a>
                <a class="nav-item" data-page="lab">
                    <i class="fas fa-desktop"></i>
                    <span>Lab Management</span>
                </a>
                <a class="nav-item" data-page="classes">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>Classes</span>
                </a>
                <a class="nav-item" data-page="reports">
                    <i class="fas fa-file-alt"></i>
                    <span>Reports</span>
                </a>
                <a class="nav-item" data-page="ai-assistant">
                    <i class="fas fa-robot"></i>
                    <span>AI Assistant</span>
                </a>
                <a class="nav-item" data-page="surveys"><i class="fas fa-poll"></i><span>Surveys</span></a>
                <a class="nav-item" data-page="kpi">
                    <i class="fas fa-trophy"></i>
                    <span>KPI Scorecard</span>
                </a>
                <a class="nav-item" data-page="settings">
                    <i class="fas fa-cog"></i>
                    <span>Settings</span>
                </a>
            </nav>
            
            <div class="sidebar-footer" id="sidebarFooter"><div id="centreInfoDisplay" style="margin-bottom:8px;padding:8px;background:rgba(255,255,255,0.05);border-radius:8px;text-align:center"><span id="roleBadge" style="font-size:10px;padding:3px 8px;border-radius:10px"></span><div id="centreNameDisplay" style="font-size:12px;font-weight:600;color:var(--accent);margin-top:4px"></div><div id="centreLocationDisplay" style="font-size:10px;color:var(--muted)"></div></div>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatarDisplay">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="user-details">
                        <h4 id="userName">Loading...</h4>
                        <span id="userRole">Instructor</span>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </button>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="menu-toggle" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>
                <div class="top-bar-right">
                    <span class="current-date" id="currentDate"></span>
                    <button class="theme-toggle" id="themeToggle" title="Toggle theme">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
            </header>
            
            <div class="content-area" id="contentArea">
                <!-- Dynamic content loaded here -->
            </div>
        </main>
    </div>
    
    <!-- Toast Container -->
    <div id="toastContainer"></div>
    
    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>
    
    <!-- Modal Container -->
    <div id="modalContainer"></div>
    
    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
    <script src="js/students.js"></script>
    <script src="js/attendance.js"></script>
    <script src="js/performance.js"></script>
    <script src="js/lab.js"></script>
    <script src="js/classes.js"></script>
    <script src="js/reports.js"></script>
    <script src="js/ai-assistant.js"></script>
    <script src="js/surveys.js"></script>
    <script src="js/kpi.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
