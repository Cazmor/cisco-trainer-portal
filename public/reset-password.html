<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cisco Trainer - Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-network-wired"></i>
                    <h1>Cisco Trainer</h1>
                </div>
                <p>Create New Password</p>
            </div>
            
            <form id="resetForm" class="login-form">
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> New Password</label>
                    <input type="password" id="password" name="password" placeholder="Create a new password" required minlength="8">
                    <small style="color: #64748b; font-size: 12px; margin-top: 4px; display: block;">Must be at least 8 characters, with 1 uppercase, 1 lowercase, 1 number, and 1 special character.</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword"><i class="fas fa-lock"></i> Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your new password" required minlength="8">
                </div>
                
                <div id="message" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 12px;"></div>
                
                <button type="submit" class="btn-login" id="submitBtn">
                    <i class="fas fa-save"></i> Reset Password
                </button>
                
                <div style="text-align: center; margin-top: 16px;">
                    <a href="login.html" style="color: #00b4d8; text-decoration: none;">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        function isStrongPassword(password) {
            const minLength = 8;
            const hasUpper = /[A-Z]/.test(password);
            const hasLower = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            const hasSpecial = /[^A-Za-z0-9]/.test(password);
            return password.length >= minLength && hasUpper && hasLower && hasNumber && hasSpecial;
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!token) {
                showMessage('Invalid or missing reset token. Please request a new link.', 'error');
                return;
            }

            if (!password || !confirmPassword) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('Passwords do not match.', 'error');
                return;
            }

            if (!isStrongPassword(password)) {
                showMessage('Password must be at least 8 characters long and contain at least one uppercase letter, one lowercase letter, one number, and one special character.', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';
            
            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, newPassword: password })
                });
                
                const text = await response.text();
                let data = null;
                try { data = text ? JSON.parse(text) : null; } catch (err) { data = null; }

                if (response.ok) {
                    showMessage('Password updated successfully. You can now login.', 'success');
                    document.getElementById('resetForm').reset();
                } else {
                    showMessage((data && data.error) || 'Failed to reset password', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-save"></i> Reset Password';
            }
        });
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.style.display = 'block';
            messageDiv.style.background = type === 'success' ? '#d1fae5' : '#fee2e2';
            messageDiv.style.color = type === 'success' ? '#065f46' : '#991b1b';
            messageDiv.style.border = '1px solid ' + (type === 'success' ? '#a7f3d0' : '#fecaca');
        }
    </script>
</body>
</html>
