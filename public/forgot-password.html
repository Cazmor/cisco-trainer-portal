<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cisco Trainer - Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-network-wired"></i>
                    <h1>Cisco Trainer</h1>
                </div>
                <p>Reset Your Password</p>
            </div>
            
            <form id="forgotForm" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email Address
                    </label>
                    <input type="email" id="email" name="email" placeholder="Enter your registered email" required>
                </div>
                
                <div id="message" style="display: none; padding: 12px; border-radius: 8px; margin-bottom: 12px;"></div>
                
                <button type="submit" class="btn-login" id="submitBtn">
                    <i class="fas fa-paper-plane"></i> Send Reset Link
                </button>
                
                <div style="text-align: center; margin-top: 16px;">
                    <a href="login.html" style="color: #00b4d8; text-decoration: none;">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('forgotForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            
            if (!email) {
                showMessage('Please enter your email address', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...';
            
            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const text = await response.text();
                let data = null;
                try { data = text ? JSON.parse(text) : null; } catch (err) { data = null; }

                if (response.ok) {
                    showMessage('Password reset link has been sent to your email. Check your inbox.', 'success');
                    document.getElementById('email').value = '';
                } else {
                    showMessage((data && data.error) || 'Failed to send reset link', 'error');
                }
            } catch (error) {
                showMessage('Network error. Please try again.', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link';
            }
        });
        
        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.style.display = 'block';
            messageDiv.style.background = type === 'success' ? '#d1fae5' : '#fee2e2';
            messageDiv.style.color = type === 'success' ? '#065f46' : '#991b1b';
            messageDiv.style.border = '1px solid ' + (type === 'success' ? '#a7f3d0' : '#fecaca');
        }
    </script>
</body>
</html>
