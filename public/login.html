<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cisco Trainer Portal - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-network-wired"></i>
                    <h1>Cisco Trainer</h1>
                </div>
                <p>Progress Tracking System</p>
            </div>
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                        <button type="button" class="toggle-password" id="togglePassword"><i class="fas fa-eye"></i></button>
                    </div>
                </div>
                <div class="form-options">
                    <label class="remember-me"><input type="checkbox" id="rememberMe"><span>Remember me</span></label>
                    <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                </div>
                <div id="errorMessage" class="error-message" style="display:none;"></div>
                <button type="submit" class="btn-login" id="loginButton"><i class="fas fa-sign-in-alt"></i> Sign In</button>
            </form>
            <div class="login-footer">
                <p>Don't have an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            var pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
            this.querySelector('i').classList.toggle('fa-eye');
            this.querySelector('i').classList.toggle('fa-eye-slash');
        });

        // Show session expired message if redirected from expired token
        (function() {
            var params = new URLSearchParams(window.location.search);
            if (params.get('reason') === 'session_expired') {
                var errorDiv = document.getElementById('errorMessage');
                errorDiv.innerHTML = '<i class="fas fa-clock"></i> Your session has expired. Please sign in again.';
                errorDiv.style.display = 'block';
                errorDiv.style.background = '#fff8e1';
                errorDiv.style.color = '#856404';
                errorDiv.style.border = '1px solid #ffc107';
                errorDiv.style.borderRadius = '6px';
                errorDiv.style.padding = '10px 14px';
            }
        })();
        
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value.trim();
            var errorDiv = document.getElementById('errorMessage');
            var btn = document.getElementById('loginButton');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            errorDiv.style.display = 'none';
            
            try {
                var resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                var data = await resp.json();
                
                if (!resp.ok) throw new Error(data.error || 'Login failed');
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                switch(data.user.role) {
                    case 'super_admin': window.location.href = '/admin.html'; break;
                    case 'admin': window.location.href = '/centre.html'; break;
                    case 'instructor': window.location.href = '/index.html'; break;
                    case 'student': window.location.href = '/learner.html'; break;
                    default: window.location.href = '/index.html';
                }
            } catch (error) {
                errorDiv.textContent = error.message;
                errorDiv.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });
    </script>
    <script src="/js/session.js"></script>`n</body>
</html>
