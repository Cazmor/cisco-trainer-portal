<!-- Templates Page Content -->
<div id="templates-page" style="display: none;">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
        <h1 style="color: var(--text); margin: 0;">📄 Template Manager</h1>
        <button onclick="showCreateTemplateModal()" style="background: var(--cisco-blue); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
            <i class="fa-solid fa-plus"></i> Create Template
        </button>
    </div>
    <div id="templates-list" style="display: grid; gap: 20px;"></div>
</div>

<!-- Create Template Modal -->
<div id="template-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;">
    <div style="background: var(--bg-secondary); border-radius: 12px; width: 600px; max-width: 90%; padding: 24px;">
        <h3 style="margin-bottom: 20px;">Create New Template</h3>
        <input type="text" id="template-name" placeholder="Template Name" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); color: var(--text);">
        <select id="template-type" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); color: var(--text);">
            <option value="student_csv">Student CSV Import</option>
            <option value="delivery_plan">Delivery Plan</option>
            <option value="performance">Performance Scores</option>
        </select>
        <textarea id="template-content" rows="8" placeholder="CSV Headers and Sample Data&#10;First Name,Last Name,Email,Stream&#10;John,Doe,john@example.com,Love" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-primary); color: var(--text); font-family: monospace;"></textarea>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="closeTemplateModal()" style="background: #64748b; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;">Cancel</button>
            <button onclick="createTemplate()" style="background: var(--cisco-blue); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer;">Create</button>
        </div>
    </div>
</div>

<script>
const API_BASE = '/api/templates';

async function loadTemplatesPage() {
    const token = localStorage.getItem('token');
    if (!token) return;
    
    try {
        const res = await fetch(API_BASE, {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        const templates = await res.json();
        
        const container = document.getElementById('templates-list');
        if (!templates.length) {
            container.innerHTML = '<div style="background: var(--bg-secondary); padding: 40px; text-align: center; border-radius: 12px;">No templates yet. Click "Create Template" to get started.</div>';
            return;
        }
        
        container.innerHTML = templates.map(t => `
            <div style="background: var(--bg-secondary); border-radius: 12px; padding: 20px; border: 1px solid var(--border);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <div>
                        <h3 style="margin: 0;">${t.name}</h3>
                        <span style="font-size: 12px; color: var(--muted);">${t.template_type}</span>
                    </div>
                    <div>
                        <button onclick="downloadTemplate(${t.id})" style="background: var(--cisco-blue); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-right: 8px;"><i class="fa-solid fa-download"></i> Download</button>
                        <button onclick="deleteTemplate(${t.id})" style="background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer;"><i class="fa-solid fa-trash"></i> Delete</button>
                    </div>
                </div>
                <pre style="background: var(--bg-primary); padding: 10px; border-radius: 8px; font-size: 12px; overflow-x: auto;">${t.content.substring(0, 200)}${t.content.length > 200 ? '...' : ''}</pre>
            </div>
        `).join('');
    } catch (err) {
        document.getElementById('templates-list').innerHTML = '<div style="color: red;">Error loading templates</div>';
    }
}

function showCreateTemplateModal() {
    document.getElementById('template-modal').style.display = 'flex';
}

function closeTemplateModal() {
    document.getElementById('template-modal').style.display = 'none';
    document.getElementById('template-name').value = '';
    document.getElementById('template-content').value = '';
}

async function createTemplate() {
    const token = localStorage.getItem('token');
    const data = {
        name: document.getElementById('template-name').value,
        category_id: 1,
        template_type: document.getElementById('template-type').value,
        content: document.getElementById('template-content').value,
        headers: []
    };
    
    if (!data.name || !data.content) {
        alert('Please fill in all fields');
        return;
    }
    
    const res = await fetch(API_BASE, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify(data)
    });
    
    if (res.ok) {
        closeTemplateModal();
        loadTemplatesPage();
    } else {
        const error = await res.json();
        alert('Error: ' + error.error);
    }
}

async function downloadTemplate(id) {
    window.open(`${API_BASE}/${id}/download`, '_blank');
}

async function deleteTemplate(id) {
    if (confirm('Delete this template?')) {
        const token = localStorage.getItem('token');
        await fetch(`${API_BASE}/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': 'Bearer ' + token }
        });
        loadTemplatesPage();
    }
}
</script>
