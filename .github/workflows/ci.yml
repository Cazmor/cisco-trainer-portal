name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app-checks:
    name: App checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks and tests
        run: npm run ci

  docker-image:
    name: Docker image
    runs-on: ubuntu-latest
    needs: app-checks

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build image
        run: docker build --tag instructor-portal:ci .
